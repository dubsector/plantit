game:
  min-players: 2
  max-rounds: 24        # first to 13 wins
  overtime-rounds: 6    # MR3 overtime

phases:
  freeze-duration: 20   # seconds — buy phase / freeze (CS2 buy window is 20s)
  round-duration: 115   # seconds — 1:55 live time
  round-end-delay: 5    # seconds between round end and next round start

# Spawn zone regions set by /plantit setspawn t|ct <regionName>
# Players spawn at a random position within the region each round
spawns:
  t:
    region: ''
    yaw: 0.0
  ct:
    region: ''
    yaw: 0.0

# Bomb site WorldGuard region names, set by /plantit setsite a|b <region>
sites:
  a: ''
  b: ''
