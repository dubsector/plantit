name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check the [releases](https://github.com/dubsector/plantit/releases) to make sure you're on the latest build.

  - type: input
    id: build
    attributes:
      label: Build number
      description: The build number from the JAR filename (e.g. `build-42`)
      placeholder: build-
    validations:
      required: true

  - type: input
    id: paper
    attributes:
      label: Paper version
      placeholder: "1.21.4 build 225"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant server console output here.
      render: text
