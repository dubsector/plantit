name: PlantIt Build

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/build.yml'
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run unit tests
        run: mvn test -q

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: mv target/plantit-*.jar "target/plantit-${VERSION}+${SHORT_SHA}.jar"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-jar
          path: target/plantit-*.jar

  paper-smoke-test:
    name: Paper Smoke Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Resolve and download Paper JAR
        run: |
          PAPER_VERSION="1.21.11"
          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds" \
            -o /tmp/paper-builds.json
          BUILD_INFO=$(python3 -c "
import json
builds = json.load(open('/tmp/paper-builds.json'))['builds']
stable = [b for b in builds if b.get('channel','') == 'default']
chosen = (stable or builds)[-1]
print(chosen['build'], chosen['downloads']['application']['sha256'])
")
          BUILD=$(echo "$BUILD_INFO" | awk '{print $1}')
          EXPECTED_SHA=$(echo "$BUILD_INFO" | awk '{print $2}')
          JAR_NAME="paper-${PAPER_VERSION}-${BUILD}.jar"
          echo "Resolved: Paper ${PAPER_VERSION} build ${BUILD}"
          mkdir -p smoke-server/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${PAPER_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" \
            -o smoke-server/paper.jar
          echo "${EXPECTED_SHA}  smoke-server/paper.jar" | sha256sum -c

      - name: Download WorldEdit and WorldGuard via Maven
        run: |
          mvn -B dependency:copy-dependencies \
            -DincludeArtifactIds=worldedit-bukkit,worldguard-bukkit \
            -DincludeScope=provided \
            -DoutputDirectory=smoke-server/plugins/

      - name: Copy plugin JAR
        run: cp plugin-jar/plantit-*.jar smoke-server/plugins/plantit.jar

      - name: Write server config
        run: |
          echo "eula=true" > smoke-server/eula.txt
          printf 'online-mode=false\n' > smoke-server/server.properties

      - name: Start Paper and wait for ready
        run: |
          cd smoke-server
          java -Xms512m -Xmx1g -jar paper.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 120 ]; do
            sleep 3; ELAPSED=$((ELAPSED + 3))
            if grep -q "Done (" server.log 2>/dev/null; then
              echo "Paper ready after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Paper process exited early after ${ELAPSED}s"
              break
            fi
          done
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: Assert plugin loaded cleanly
        run: |
          LOG=smoke-server/server.log
          echo "--- Server log ---"
          cat "$LOG"
          echo "--- End log ---"

          if grep -qiE "error loading plugin.*plantit|failed to load.*plantit|exception in thread" "$LOG"; then
            echo "::error::plantit logged errors on startup"
            grep -iE "error loading plugin.*plantit|failed to load.*plantit|exception in thread" "$LOG"
            exit 1
          fi

          if ! grep -qi "plantit" "$LOG"; then
            echo "::error::plantit plugin did not appear in server log"
            exit 1
          fi

          if ! grep -q "Done (" "$LOG"; then
            echo "::error::Paper did not reach ready state"
            exit 1
          fi

          echo "Paper smoke test passed"

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paper-smoke-log
          path: smoke-server/server.log
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, paper-smoke-test]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn deploy -DskipTests -q

      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: plugin-jar/plantit-*.jar

      - name: Copy provenance bundle for release
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          JAR=$(ls plugin-jar/plantit-*.jar | head -1)
          cp "$BUNDLE_PATH" "${JAR}.intoto.jsonl"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign JAR
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          JAR=$(ls plugin-jar/plantit-*.jar)
          cosign sign-blob --yes --bundle "${JAR}.sigstore.json" "$JAR"

      - name: Generate release notes
        env:
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          REPO: ${{ github.repository }}
        run: |
          printf '> [!WARNING]\n> **Use at your own risk.** This is an automated pre-release build and may be unstable. Not recommended for production use.\n\nBuilt from [%s](https://github.com/%s/commit/%s)\n\n**Requires:** Paper 1.21.11 · WorldGuard 7.0.17 · Java 21\n' \
            "$SHORT_SHA" "$REPO" "$GITHUB_SHA" > release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          gh release create "build-${RUN_NUMBER}" \
            --title "plantit ${VERSION} build ${RUN_NUMBER} (${SHORT_SHA})" \
            --notes-file release-notes.md \
            --prerelease \
            plugin-jar/plantit-*.jar \
            plugin-jar/plantit-*.jar.sigstore.json \
            plugin-jar/plantit-*.jar.intoto.jsonl
